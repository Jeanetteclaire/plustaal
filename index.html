<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>PlusTaal</title>

  <!-- Manrope from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #1a1814;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #f0e9dd;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== Wall view ===== */

    .wall-view {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(2rem, env(safe-area-inset-top)) 1.5rem max(2rem, env(safe-area-inset-bottom));
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .wall-view.hidden {
      opacity: 0;
      transform: scale(0.98);
      pointer-events: none;
    }

    .title {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #f0e9dd;
      text-align: center;
      margin-top: 1rem;
      margin-bottom: 0.2rem;
    }

    .wall {
      width: 100%;
      max-width: 360px;
      flex: 1;
      display: flex;
      align-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0;
      width: 100%;
    }

    .tile {
      aspect-ratio: 1;
      position: relative;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: transform 0.15s ease;
      font: inherit;
      color: inherit;
    }

    .tile:active {
      transform: scale(0.85);
    }

    .tile-plus {
      position: relative;
      display: block;
    }

    .tile-plus::before,
    .tile-plus::after {
      content: '';
      position: absolute;
      background: #f0e9dd;
    }

    .tile-plus::before {
      width: 30%;
      height: 100%;
      left: 35%;
      top: 0;
    }

    .tile-plus::after {
      width: 100%;
      height: 30%;
      top: 35%;
      left: 0;
    }

    /* ===== Snap view ===== */

    .snap-view {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      transition: opacity 0.35s ease, transform 0.35s ease;
      z-index: 10;
    }

    .snap-view.hidden {
      opacity: 0;
      transform: scale(1.02);
      pointer-events: none;
    }

    .snap-pages {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .snap-pages::-webkit-scrollbar {
      display: none;
    }

    .snap-page {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    .snap-page.level-1 { background: #1a1814; }
    .snap-page.level-2 { background: #252119; }
    .snap-page.level-3 { background: #302a1f; }
    .snap-page.level-4 { background: #3b3326; }

    .plus-decoration {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .decoration-plus {
      position: absolute;
      transform: translate(-50%, -50%);
      opacity: 0.07;
    }

    .page-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 320px;
    }

    .page-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f0e9dd;
      opacity: 0.55;
      margin-bottom: 1.5rem;
    }

    .page-title {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #f0e9dd;
      line-height: 1.1;
    }

    .back-button {
      position: fixed;
      top: max(1rem, env(safe-area-inset-top));
      left: 1rem;
      width: 44px;
      height: 44px;
      background: transparent;
      border: none;
      color: #f0e9dd;
      font-size: 22px;
      font-family: inherit;
      cursor: pointer;
      z-index: 20;
      opacity: 0.6;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s ease, transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .back-button:active {
      opacity: 1;
      transform: scale(0.9);
    }
  </style>
</head>
<body>

  <div class="wall-view" id="wall-view">
    <h1 class="title">PlusTaal</h1>
    <div class="wall">
      <div class="grid" id="tile-grid"></div>
    </div>
  </div>

  <div class="snap-view hidden" id="snap-view">
    <button class="back-button" id="back-button" aria-label="back to wall">←</button>

    <div class="snap-pages" id="snap-pages">
      <section class="snap-page level-1">
        <div class="plus-decoration" data-level="1"></div>
        <div class="page-content">
          <div class="page-label">Level 1 / 4</div>
          <div class="page-title">Recognition</div>
        </div>
      </section>

      <section class="snap-page level-2">
        <div class="plus-decoration" data-level="2"></div>
        <div class="page-content">
          <div class="page-label">Level 2 / 4</div>
          <div class="page-title">Cloze</div>
        </div>
      </section>

      <section class="snap-page level-3">
        <div class="plus-decoration" data-level="3"></div>
        <div class="page-content">
          <div class="page-label">Level 3 / 4</div>
          <div class="page-title">Simple translation</div>
        </div>
      </section>

      <section class="snap-page level-4">
        <div class="plus-decoration" data-level="4"></div>
        <div class="page-content">
          <div class="page-label">Level 4 / 4</div>
          <div class="page-title">Complex translation</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const grid = document.getElementById('tile-grid');
    const COLS = 6;
    const ROWS = 10;

    grid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

    const MASTERY_SIZES = [78, 62, 43, 33, 17];

    function masteryForPosition(row, col) {
      const positionProgress = (row / (ROWS - 1)) * 0.6 + (col / (COLS - 1)) * 0.4;
      const masteryLevel = Math.round((1 - positionProgress) * 4);
      return Math.max(0, Math.min(4, masteryLevel));
    }

    for (let i = 0; i < COLS * ROWS; i++) {
      const row = Math.floor(i / COLS);
      const col = i % COLS;

      const masteryLevel = masteryForPosition(row, col);
      const baseSize = MASTERY_SIZES[masteryLevel];
      const variation = (Math.random() - 0.5) * 6;
      const plusPercent = baseSize + variation;

      const tile = document.createElement('button');
      tile.className = 'tile';
      tile.dataset.index = i;
      tile.setAttribute('aria-label', `tile ${i + 1}`);

      const plus = document.createElement('span');
      plus.className = 'tile-plus';
      plus.style.width = `${plusPercent}%`;
      plus.style.height = `${plusPercent}%`;

      tile.appendChild(plus);
      grid.appendChild(tile);
    }

    // ===== Snap view navigation =====

    const wallView = document.getElementById('wall-view');
    const snapView = document.getElementById('snap-view');
    const snapPages = document.getElementById('snap-pages');
    const backButton = document.getElementById('back-button');

    function openSnapView(tileIndex) {
      snapPages.scrollLeft = 0;
      wallView.classList.add('hidden');
      snapView.classList.remove('hidden');
    }

    function closeSnapView() {
      snapView.classList.add('hidden');
      wallView.classList.remove('hidden');
    }

    document.querySelectorAll('.tile').forEach(tile => {
      tile.addEventListener('click', () => {
        const tileIndex = parseInt(tile.dataset.index, 10);
        openSnapView(tileIndex);
      });
    });

    backButton.addEventListener('click', closeSnapView);

    // ===== Outline plus-sign decorations =====

    const PLUS_OUTLINE_PATH = 'M 35,0 L 65,0 L 65,35 L 100,35 L 100,65 L 65,65 L 65,100 L 35,100 L 35,65 L 0,65 L 0,35 L 35,35 Z';

    function generatePlusDecorations(container, count) {
      for (let i = 0; i < count; i++) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 100 100');
        svg.setAttribute('class', 'decoration-plus');

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', PLUS_OUTLINE_PATH);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', '#f0e9dd');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('stroke-linejoin', 'round');

        svg.appendChild(path);

        const size = 40 + Math.random() * 140;
        const left = Math.random() * 100;
        const top = Math.random() * 100;

        svg.style.left = `${left}%`;
        svg.style.top = `${top}%`;
        svg.style.width = `${size}px`;
        svg.style.height = `${size}px`;

        container.appendChild(svg);
      }
    }

    document.querySelectorAll('.plus-decoration').forEach(container => {
      generatePlusDecorations(container, 18);
    });

  </script>
</body>
</html>
